name: devoq-ai

services:
  backend:
    container_name: devoq-ai-backend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - apps_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r)=>process.exit(r.statusCode===200?0:1))"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

  frontend:
    container_name: devoq-ai-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - apps_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health", "||", "exit", "1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

networks:
  apps_network:
    external: true
