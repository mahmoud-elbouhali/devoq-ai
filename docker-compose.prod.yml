services:
  ai-service:
    container_name: devoq-ai-ai-service
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    volumes:
      - ./models:/models:ro
    environment:
      AI_DETECTOR_MODE: baseline
      AI_MODEL_VERSION: simple-vision-v1
      AI_YOLOX_MODEL_PATH: /models/yolox.onnx
      AI_YOLOX_CLASS_NAMES: screw
      AI_YOLOX_TARGET_CLASSES: screw
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks:
      - apps_network

  backend:
    container_name: devoq-ai-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - ai-service
    environment:
      NODE_ENV: production
      PORT: 3000
      COUNT_ENGINE_MODE: real
      COUNT_REAL_MODEL_VERSION: simple-vision-v1
      AI_DETECTOR_MODE: baseline
      AI_MODEL_VERSION: simple-vision-v1
      AI_SERVICE_URL: http://devoq-ai-ai-service:8000
      CORS_ORIGIN: https://devoq-ai.com
      JWT_SECRET: ${JWT_SECRET}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devoq-ai-backend.rule=Host(`api.devoq-ai.com`)"
      - "traefik.http.routers.devoq-ai-backend.entrypoints=websecure"
      - "traefik.http.routers.devoq-ai-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.devoq-ai-backend.loadbalancer.server.port=3000"

  frontend:
    container_name: devoq-ai-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.devoq-ai-frontend.rule=Host(`devoq-ai.com`)"
      - "traefik.http.routers.devoq-ai-frontend.entrypoints=websecure"
      - "traefik.http.routers.devoq-ai-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.devoq-ai-frontend.loadbalancer.server.port=80"
